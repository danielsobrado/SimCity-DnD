name: Editor CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-assets.txt
      - run: python -m pip install -r requirements-assets.txt
      - run: python scripts/generate-placeholder-models.py
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run validate:assets
      - run: npm test
      - run: npm run build
