name: Build starter pack

on:
  push:
    branches: [main]
    paths:
      - 'starter/archive.part*'
      - 'starter/build-starter-pack.mjs'
      - '.github/workflows/build-starter-pack.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: node starter/build-starter-pack.mjs

      - name: Verify ZIP
        run: |
          unzip -t starter/simcity-dnd-starter-pack.zip
          test "$(unzip -Z1 starter/simcity-dnd-starter-pack.zip | grep -c '\.svg$')" -ge 19

      - name: Commit generated pack
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add starter/simcity-dnd-starter-pack.zip
          if git diff --cached --quiet; then
            echo 'Starter pack is unchanged.'
            exit 0
          fi
          git commit -m 'Build SimCity DnD starter pack'
          git push
