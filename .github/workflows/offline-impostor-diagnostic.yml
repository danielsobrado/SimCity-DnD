name: Offline impostor diagnostic

# Temporary PR workflow marker; the base workflow performs the actual bake.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/offline-impostor-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Locate Chromium
        shell: bash
        run: |
          set -euo pipefail
          browser="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          test -n "$browser"
          echo "CHROME_PATH=$browser" >> "$GITHUB_ENV"
          "$browser" --version
      - name: Bake offline impostor atlases
        run: npm run bake:impostors
      - name: Validate generated assets
        run: |
          test -f public/assets/impostors/trees/manifest.json
          npm run validate:assets
      - name: Upload generated impostors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-tree-impostors
          path: public/assets/impostors/trees
          if-no-files-found: warn
          retention-days: 3
