name: Build GLB Assets

on:
  push:
    branches: [main]
    paths:
      - config/objects.yaml
      - requirements-assets.txt
      - scripts/generate-placeholder-models.py
      - .github/workflows/build-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements-assets.txt
      - run: python scripts/generate-placeholder-models.py
      - name: Commit generated GLB pack
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/models/settlement-core.glb
          if git diff --cached --quiet; then
            echo "GLB asset pack is current."
            exit 0
          fi
          git commit -m "Build settlement GLB asset pack"
          git push
