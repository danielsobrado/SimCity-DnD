name: Cancel superseded offline impostor WebGL runs

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/offline-impostor-bake-webgl.yml

concurrency:
  group: offline-impostor-bake-webgl
  cancel-in-progress: true

jobs:
  cancel-legacy:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo cancelled
