name: Cancel stuck tree impostor bake runs

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bake-tree-impostors.yml

concurrency:
  group: bake-tree-impostors-main
  cancel-in-progress: true

jobs:
  cancel-legacy:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "Legacy offline impostor bake queue cancelled."
