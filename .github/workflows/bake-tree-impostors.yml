name: Cancel stuck tree impostor bake runs

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bake-tree-impostors.yml

concurrency:
  group: bake-tree-impostors-main
  cancel-in-progress: true

jobs:
  cancel-legacy:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo cancelled
