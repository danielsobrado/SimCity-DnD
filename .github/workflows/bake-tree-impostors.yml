name: Bake tree impostors

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/bake-tree-impostors.yml
      - editor.config.yaml
      - public/assets/grass-scene.glb
      - scripts/bake-tree-impostors.mjs
      - scripts/validate-impostors.mjs
      - src/editor/stylized/StylizedTreeView.js
      - src/editor/stylized/TreeLodAssembler.js
      - src/editor/stylized/impostor/**

permissions:
  contents: write

concurrency:
  group: offline-tree-impostors-main
  cancel-in-progress: true

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Locate Chromium
        shell: bash
        run: |
          set -euo pipefail
          browser="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [[ -z "$browser" ]]; then
            echo "No Chromium-family browser is installed on the runner." >&2
            exit 1
          fi
          echo "CHROME_PATH=$browser" >> "$GITHUB_ENV"
          "$browser" --version

      - name: Bake offline impostor atlases
        run: npm run bake:impostors

      - name: Verify generated assets and application
        run: npm run verify

      - name: Upload generated atlases
        uses: actions/upload-artifact@v4
        with:
          name: offline-tree-impostors
          path: public/assets/impostors/trees
          if-no-files-found: error
          retention-days: 7

      - name: Commit generated assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- public/assets/impostors/trees
          if git diff --cached --quiet; then
            echo "Offline tree impostor assets are already current."
            exit 0
          fi
          git commit -m "build: refresh offline tree impostor atlases"
          git pull --rebase origin main
          git push origin HEAD:main
